<article class="panel">
  <h2>Distribusi Panjang Ulasan <small>(Dalam Kata)</small></h2>
  <div class="bar-chart">
    {% set max_count = summary.length_distribution|map(attribute='count')|max or 1 %}
    {% for item in summary.length_distribution %}
      <div><i style="height: {{ (item.count / max_count * 180) if max_count else 0 }}px"></i><span>{{ item.label }}</span></div>
    {% endfor %}
  </div>
</article>
